  <g fill="#AFCA0B" opacity="0.95" transform="translate(360 200)">
    <circle cx="0" cy="-10" r="14"/>
    <path d="M -22 10 Q -10 20 0 18 Q 10 16 22 8 L 18 25 Q 8 35 0 38 Q -8 35 -18 25 Z"/>
    <path d="M -10 38 L -16 90 L -8 92 L -2 50 L 2 50 L 8 92 L 16 90 L 10 38 Z"/>
