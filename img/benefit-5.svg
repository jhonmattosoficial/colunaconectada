<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b5bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#3A6FB8"/>
      <stop offset="50%" stop-color="#1F4F9C"/>
      <stop offset="100%" stop-color="#15396E"/>
    </linearGradient>
    <radialGradient id="b5heal" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#C9DE4A" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="#AFCA0B" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#AFCA0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b5core" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C9DE4A"/>
      <stop offset="100%" stop-color="#AFCA0B"/>
    </radialGradient>
    <filter id="b5blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#b5bg)"/>
  <!-- Healing aura -->
  <circle cx="400" cy="260" r="280" fill="url(#b5heal)"/>
  <!-- Concentric ripple rings emanating outward -->
  <g fill="none" opacity="0.95">
    <circle cx="400" cy="260" r="40" stroke="#AFCA0B" stroke-width="3" opacity="0.95"/>
    <circle cx="400" cy="260" r="75" stroke="#AFCA0B" stroke-width="2.5" opacity="0.75"/>
    <circle cx="400" cy="260" r="115" stroke="#FFFFFF" stroke-width="1.8" opacity="0.55"/>
    <circle cx="400" cy="260" r="160" stroke="#FFFFFF" stroke-width="1.5" opacity="0.4"/>
    <circle cx="400" cy="260" r="210" stroke="#FFFFFF" stroke-width="1.2" opacity="0.28"/>
    <circle cx="400" cy="260" r="265" stroke="#FFFFFF" stroke-width="1" opacity="0.18"/>
    <circle cx="400" cy="260" r="325" stroke="#FFFFFF" stroke-width="0.8" opacity="0.12"/>
  </g>
  <!-- Soft gentle wave overlay -->
  <g stroke="#C9DE4A" stroke-width="1.2" fill="none" opacity="0.6" stroke-linecap="round">
    <path d="M -20 380 Q 200 360 400 380 T 820 380"/>
    <path d="M -20 410 Q 200 390 400 410 T 820 410" opacity="0.7"/>
    <path d="M -20 440 Q 200 420 400 440 T 820 440" opacity="0.45"/>
    <path d="M -20 470 Q 200 450 400 470 T 820 470" opacity="0.3"/>
  </g>
  <!-- Glowing healing core -->
  <circle cx="400" cy="260" r="22" fill="url(#b5core)" filter="url(#b5blur)"/>
  <circle cx="400" cy="260" r="14" fill="#FFFFFF"/>
  <circle cx="400" cy="260" r="6" fill="#AFCA0B"/>
  <!-- Floating relief particles -->
  <g fill="#AFCA0B">
    <circle cx="200" cy="180" r="3" opacity="0.9"/>
    <circle cx="600" cy="180" r="3" opacity="0.9"/>
    <circle cx="160" cy="280" r="2.5" opacity="0.7"/>
    <circle cx="640" cy="280" r="2.5" opacity="0.7"/>
    <circle cx="280" cy="100" r="2" opacity="0.6"/>
    <circle cx="520" cy="100" r="2" opacity="0.6"/>
    <circle cx="300" cy="400" r="2.5" opacity="0.55"/>
    <circle cx="500" cy="400" r="2.5" opacity="0.55"/>
  </g>
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="120" cy="150" r="1.2"/>
    <circle cx="680" cy="150" r="1.2"/>
    <circle cx="80" cy="320" r="1.2"/>
    <circle cx="720" cy="320" r="1.2"/>
    <circle cx="380" cy="60" r="1.5"/>
    <circle cx="420" cy="450" r="1.5"/>
  </g>
</svg>
