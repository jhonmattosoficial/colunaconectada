<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b6sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3A6FB8"/>
      <stop offset="55%" stop-color="#C9D8EE"/>
      <stop offset="100%" stop-color="#F5FAD8"/>
    </linearGradient>
    <linearGradient id="b6hill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#AFCA0B"/>
      <stop offset="100%" stop-color="#8FA808"/>
    </linearGradient>
    <linearGradient id="b6hill2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F4F9C"/>
      <stop offset="100%" stop-color="#15396E"/>
    </linearGradient>
    <radialGradient id="b6sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#FFF5C0"/>
      <stop offset="100%" stop-color="#AFCA0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="800" height="500" fill="url(#b6sky)"/>
  <!-- Sun glow -->
  <circle cx="580" cy="160" r="180" fill="url(#b6sun)" opacity="0.8"/>
  <circle cx="580" cy="160" r="48" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="580" cy="160" r="32" fill="#FFF5C0"/>
  <!-- Distant mountain layer -->
  <path d="M 0 320 L 100 250 L 200 290 L 320 230 L 450 280 L 580 240 L 700 280 L 800 250 L 800 360 L 0 360 Z" fill="url(#b6hill2)" opacity="0.55"/>
  <!-- Mid hill layer -->
  <path d="M 0 360 Q 150 300 320 340 Q 480 380 660 320 Q 740 290 800 320 L 800 400 L 0 400 Z" fill="#3A6FB8" opacity="0.7"/>
  <!-- Foreground hill (lime) -->
  <path d="M 0 420 Q 200 380 400 410 Q 600 440 800 400 L 800 500 L 0 500 Z" fill="url(#b6hill)"/>
  <!-- Path winding through foreground -->
  <path d="M 380 500 Q 380 470 400 450 Q 420 440 410 420 Q 400 410 415 400" fill="none" stroke="#F5FAD8" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <path d="M 380 500 Q 380 470 400 450 Q 420 440 410 420 Q 400 410 415 400" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <!-- Two figures walking together on the path -->
  <g transform="translate(390 410)">
    <!-- Figure 1 (slightly behind) -->
    <g fill="#15396E">
      <circle cx="-9" cy="-30" r="7"/>
      <path d="M -16 -22 L -2 -22 L -4 -2 L -14 -2 Z"/>
      <path d="M -14 -2 L -16 22 L -10 22 L -8 -2 Z"/>
      <path d="M -4 -2 L -2 22 L 4 22 L 2 -2 Z"/>
    </g>
    <!-- Figure 2 (slightly ahead) -->
    <g fill="#1F4F9C" transform="translate(14 -4)">
      <circle cx="0" cy="-30" r="7.5"/>
      <path d="M -8 -22 L 8 -22 L 6 0 L -6 0 Z"/>
      <path d="M -6 0 L -8 24 L -2 24 L 0 0 Z"/>
      <path d="M 0 0 L 2 24 L 8 24 L 6 0 Z"/>
    </g>
  </g>
  <!-- Distant tree silhouettes -->
  <g fill="#15396E" opacity="0.6">
    <ellipse cx="100" cy="340" rx="14" ry="22"/>
    <rect x="98" y="350" width="4" height="14"/>
    <ellipse cx="160" cy="350" rx="11" ry="18"/>
    <rect x="158" y="358" width="3" height="10"/>
    <ellipse cx="700" cy="345" rx="16" ry="24"/>
    <rect x="698" y="355" width="4" height="14"/>
  </g>
  <!-- Birds far off -->
  <g stroke="#15396E" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M 180 130 Q 190 122 200 130 Q 210 122 220 130"/>
    <path d="M 250 100 Q 258 94 266 100 Q 274 94 282 100"/>
  </g>
  <!-- Floating warm particles (golden hour) -->
  <g fill="#FFF5C0" opacity="0.85">
    <circle cx="280" cy="200" r="2"/>
    <circle cx="320" cy="240" r="1.5"/>
    <circle cx="480" cy="220" r="1.8"/>
    <circle cx="540" cy="260" r="1.5"/>
    <circle cx="420" cy="280" r="1.5"/>
    <circle cx="660" cy="240" r="1.8"/>
  </g>
</svg>
