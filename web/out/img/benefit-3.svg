<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b3sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F4F9C"/>
      <stop offset="55%" stop-color="#3A6FB8"/>
      <stop offset="85%" stop-color="#AFCA0B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9DE4A" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="b3sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#C9DE4A"/>
      <stop offset="60%" stop-color="#AFCA0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#AFCA0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#b3sky)"/>
  <!-- Horizon glow -->
  <ellipse cx="400" cy="500" rx="500" ry="120" fill="#AFCA0B" opacity="0.15"/>
  <!-- Rising sun -->
  <circle cx="400" cy="380" r="170" fill="url(#b3sun)"/>
  <circle cx="400" cy="380" r="60" fill="#FFFFFF" opacity="0.9"/>
  <!-- Light rays -->
  <g stroke="#AFCA0B" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="400" y1="380" x2="400" y2="80"/>
    <line x1="400" y1="380" x2="180" y2="180"/>
    <line x1="400" y1="380" x2="620" y2="180"/>
    <line x1="400" y1="380" x2="60" y2="320"/>
    <line x1="400" y1="380" x2="740" y2="320"/>
    <line x1="400" y1="380" x2="240" y2="100"/>
    <line x1="400" y1="380" x2="560" y2="100"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.55">
    <line x1="400" y1="380" x2="320" y2="60"/>
    <line x1="400" y1="380" x2="480" y2="60"/>
    <line x1="400" y1="380" x2="120" y2="240"/>
    <line x1="400" y1="380" x2="680" y2="240"/>
  </g>
  <!-- Horizon line -->
  <line x1="0" y1="395" x2="800" y2="395" stroke="#FFFFFF" stroke-width="1" opacity="0.35"/>
  <!-- Running figure in motion -->
  <g fill="#15396E" opacity="0.95" transform="translate(540 360)">
    <!-- Head -->
    <circle cx="0" cy="-32" r="9"/>
    <!-- Torso leaning forward -->
    <path d="M -6 -22 L 14 -10 L 18 14 L 10 16 L 6 -8 L -2 -8 Z"/>
    <!-- Front leg up -->
    <path d="M 10 14 L 22 32 L 16 38 L 4 22 Z"/>
    <!-- Back leg push -->
    <path d="M 6 -2 L -8 14 L -22 28 L -16 32 L -2 18 L 12 4 Z"/>
    <!-- Front arm forward -->
    <path d="M 14 -10 L 26 -22 L 30 -16 L 18 -4 Z"/>
    <!-- Back arm -->
    <path d="M -6 -18 L -22 -10 L -24 -16 L -10 -24 Z"/>
  </g>
  <!-- Energy dots -->
  <g fill="#AFCA0B">
    <circle cx="120" cy="160" r="2.5" opacity="0.8"/>
    <circle cx="680" cy="160" r="2.5" opacity="0.8"/>
    <circle cx="200" cy="80" r="2" opacity="0.6"/>
    <circle cx="600" cy="80" r="2" opacity="0.6"/>
    <circle cx="60" cy="260" r="2" opacity="0.5"/>
    <circle cx="740" cy="260" r="2" opacity="0.5"/>
  </g>
</svg>
