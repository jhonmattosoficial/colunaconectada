<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b4bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1F4F9C"/>
      <stop offset="50%" stop-color="#15396E"/>
      <stop offset="100%" stop-color="#1F4F9C"/>
    </linearGradient>
    <radialGradient id="b4aura" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#AFCA0B" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#AFCA0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#AFCA0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="b4spine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#C9DE4A"/>
      <stop offset="100%" stop-color="#AFCA0B"/>
    </linearGradient>
    <filter id="b4glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#b4bg)"/>
  <circle cx="400" cy="260" r="240" fill="url(#b4aura)"/>
  <!-- Faint full silhouette outline (sitting meditative pose) -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.18" stroke-linecap="round">
    <!-- Head -->
    <circle cx="400" cy="90" r="28"/>
    <!-- Shoulders to torso -->
    <path d="M 330 150 Q 320 200 330 280 L 470 280 Q 480 200 470 150 Z"/>
    <!-- Folded legs (cross legged) -->
    <path d="M 330 280 Q 240 320 220 380 L 360 380 Q 400 350 400 320"/>
    <path d="M 470 280 Q 560 320 580 380 L 440 380 Q 400 350 400 320"/>
    <!-- Arms resting on knees -->
    <path d="M 330 220 Q 280 250 260 290 Q 260 320 280 330"/>
    <path d="M 470 220 Q 520 250 540 290 Q 540 320 520 330"/>
  </g>
  <!-- Glowing spine column -->
  <g filter="url(#b4glow)">
    <line x1="400" y1="120" x2="400" y2="290" stroke="url(#b4spine)" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Vertebra/chakra points along spine -->
  <g>
    <circle cx="400" cy="130" r="9" fill="#AFCA0B" filter="url(#b4glow)"/>
    <circle cx="400" cy="130" r="4" fill="#FFFFFF"/>
    <circle cx="400" cy="170" r="7" fill="#C9DE4A" filter="url(#b4glow)"/>
    <circle cx="400" cy="170" r="3" fill="#FFFFFF"/>
    <circle cx="400" cy="210" r="9" fill="#AFCA0B" filter="url(#b4glow)"/>
    <circle cx="400" cy="210" r="4" fill="#FFFFFF"/>
    <circle cx="400" cy="250" r="7" fill="#C9DE4A" filter="url(#b4glow)"/>
    <circle cx="400" cy="250" r="3" fill="#FFFFFF"/>
    <circle cx="400" cy="290" r="11" fill="#AFCA0B" filter="url(#b4glow)"/>
    <circle cx="400" cy="290" r="5" fill="#FFFFFF"/>
  </g>
  <!-- Radiating awareness rings -->
  <g fill="none" stroke="#AFCA0B" stroke-width="1" opacity="0.4">
    <ellipse cx="400" cy="210" rx="120" ry="40"/>
    <ellipse cx="400" cy="210" rx="180" ry="60" opacity="0.6"/>
    <ellipse cx="400" cy="210" rx="240" ry="80" opacity="0.3"/>
  </g>
  <!-- Distant particles -->
  <g fill="#FFFFFF" opacity="0.5">
    <circle cx="150" cy="180" r="1.5"/>
    <circle cx="650" cy="180" r="1.5"/>
    <circle cx="100" cy="380" r="1.2"/>
    <circle cx="700" cy="380" r="1.2"/>
    <circle cx="240" cy="80" r="1"/>
    <circle cx="560" cy="80" r="1"/>
    <circle cx="200" cy="430" r="1.2"/>
    <circle cx="600" cy="430" r="1.2"/>
  </g>
</svg>
