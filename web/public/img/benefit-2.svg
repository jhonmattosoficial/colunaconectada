<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="b2bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#15396E"/>
      <stop offset="60%" stop-color="#1F4F9C"/>
      <stop offset="100%" stop-color="#3A6FB8"/>
    </linearGradient>
    <radialGradient id="b2release" cx="50%" cy="55%">
      <stop offset="0%" stop-color="#AFCA0B" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#AFCA0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#AFCA0B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#b2bg)"/>
  <circle cx="400" cy="280" r="300" fill="url(#b2release)"/>
  <!-- Tight knot center, loosening outward -->
  <g fill="none" stroke="#AFCA0B" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <circle cx="400" cy="260" r="22" stroke-width="3"/>
    <circle cx="400" cy="260" r="14" stroke-width="2.5"/>
  </g>
  <!-- Dissolving threads radiating out -->
  <g stroke="#FFFFFF" fill="none" stroke-linecap="round">
    <path d="M 400 260 Q 320 200 220 180 Q 140 170 60 200" stroke-width="1.8" opacity="0.6"/>
    <path d="M 400 260 Q 480 200 580 180 Q 660 170 740 200" stroke-width="1.8" opacity="0.6"/>
    <path d="M 400 260 Q 360 180 320 100 Q 290 50 280 20" stroke-width="1.5" opacity="0.5"/>
    <path d="M 400 260 Q 440 180 480 100 Q 510 50 520 20" stroke-width="1.5" opacity="0.5"/>
    <path d="M 400 260 Q 320 340 240 380 Q 160 410 80 420" stroke-width="1.5" opacity="0.45"/>
    <path d="M 400 260 Q 480 340 560 380 Q 640 410 720 420" stroke-width="1.5" opacity="0.45"/>
    <path d="M 400 260 Q 380 360 360 440 Q 350 470 340 490" stroke-width="1.2" opacity="0.4"/>
    <path d="M 400 260 Q 420 360 440 440 Q 450 470 460 490" stroke-width="1.2" opacity="0.4"/>
  </g>
  <!-- Lime dispersing particles -->
  <g fill="#AFCA0B">
    <circle cx="180" cy="190" r="3" opacity="0.9"/>
    <circle cx="100" cy="220" r="2" opacity="0.6"/>
    <circle cx="620" cy="190" r="3" opacity="0.9"/>
    <circle cx="700" cy="220" r="2" opacity="0.6"/>
    <circle cx="300" cy="80" r="2.5" opacity="0.7"/>
    <circle cx="500" cy="80" r="2.5" opacity="0.7"/>
    <circle cx="200" cy="400" r="2.5" opacity="0.65"/>
    <circle cx="600" cy="400" r="2.5" opacity="0.65"/>
    <circle cx="350" cy="450" r="2" opacity="0.5"/>
    <circle cx="450" cy="450" r="2" opacity="0.5"/>
  </g>
  <!-- Soft white particles for "release" feel -->
  <g fill="#FFFFFF" opacity="0.4">
    <circle cx="250" cy="150" r="1.5"/>
    <circle cx="550" cy="150" r="1.5"/>
    <circle cx="150" cy="320" r="1.2"/>
    <circle cx="650" cy="320" r="1.2"/>
    <circle cx="400" cy="430" r="1.5"/>
  </g>
</svg>
